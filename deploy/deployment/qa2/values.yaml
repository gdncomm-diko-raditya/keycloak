# qa2 (lower env) overrides. Bump `restart` to force a redeploy of the same tag.
restart: 1

image:
  # Set to the tag the app-repo CI produced (e.g. keycloak-26.1-0.1.0-SNAPSHOT).
  tag: keycloak-26.1-0.1.0-SNAPSHOT

ingress:
  domainName: qa2-sg.cld

env:
  # Public hostname Keycloak generates issuer/redirect URLs from — must match
  # the ingress host. Adjust to the real qa2 Keycloak hostname.
  KC_HOSTNAME: https://keycloak.qa2-sg.cld
