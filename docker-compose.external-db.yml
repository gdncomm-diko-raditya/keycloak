# Keycloak pointing at an EXTERNAL, DBA-provided PostgreSQL.
# No Postgres container here — the database lives outside this stack, exactly
# like qa2/prod where the DBA provisions it and we only supply connection env.
#
# Usage:
#   1. Put the DBA's connection details in .env:
#        KC_DB_URL=jdbc:postgresql://<dba-host>:5432/<dbname>
#        KC_DB_USERNAME=<user>
#        KC_DB_PASSWORD=<password>
#   2. docker compose -f docker-compose.external-db.yml up --build
services:
  keycloak:
    build:
      context: .
      args:
        KEYCLOAK_VERSION: ${KEYCLOAK_VERSION:-26.1}
    container_name: keycloak
    command: start --optimized
    environment:
      # Vendor is already baked into the image; URL + credentials are runtime.
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL:?set KC_DB_URL to the DBA-provided Postgres JDBC URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME:?set KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?set KC_DB_PASSWORD}

      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}

      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"
